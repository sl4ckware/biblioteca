###############################################################
# CONFIGURACI\u00d3N GENERAL DE LA APLICACI\u00d3N
###############################################################

# Nombre de la aplicaci\u00f3n
spring.application.name=biblioteca


###############################################################
# CONFIGURACI\u00d3N DEL SERVIDOR
###############################################################

# Puerto donde se ejecutar\u00e1 la aplicaci\u00f3n
server.port=8080


###############################################################
# CONFIGURACI\u00d3N DE LA BASE DE DATOS
###############################################################

# URL de conexi\u00f3n a MariaDB
spring.datasource.url=jdbc:mariadb://localhost:3306/biblioteca

# Usuario de la base de datos
spring.datasource.username=root

# Contrase\u00f1a
spring.datasource.password=mypass

# Driver JDBC
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver


###############################################################
# CONFIGURACI\u00d3N DE JPA / HIBERNATE
###############################################################

# Dialecto de MariaDB
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# Mostrar el SQL generado
spring.jpa.show-sql=true

# Formatear el SQL para facilitar la lectura
spring.jpa.properties.hibernate.format_sql=true

# Estrategia de creaci\u00f3n de tablas
# none
# validate
# update
# create
# create-drop
spring.jpa.hibernate.ddl-auto=update

# Mostrar comentarios de Hibernate
spring.jpa.properties.hibernate.use_sql_comments=true


###############################################################
# LOGS DE HIBERNATE
###############################################################

# Mostrar consultas SQL
logging.level.org.hibernate.SQL=DEBUG

# Mostrar los par\u00e1metros enviados a las consultas
logging.level.org.hibernate.orm.jdbc.bind=TRACE


###############################################################
# CONFIGURACI\u00d3N DE CODIFICACI\u00d3N
###############################################################

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true


###############################################################
# CONFIGURACI\u00d3N DE LOGS DE SPRING
###############################################################

logging.level.org.springframework.web=INFO

logging.level.org.springframework.boot=INFO


###############################################################
# MENSAJES DE ERROR
###############################################################

server.error.include-message=always
server.error.include-binding-errors=always


##########################################################
# OpenAPI / Swagger
##########################################################

springdoc.swagger-ui.path=/swagger

springdoc.api-docs.path=/api-docs

springdoc.swagger-ui.operationsSorter=method

springdoc.swagger-ui.tagsSorter=alpha

springdoc.swagger-ui.display-request-duration=true

springdoc.swagger-ui.try-it-out-enabled=true

springdoc.swagger-ui.filter=true

springdoc.default-produces-media-type=application/json

springdoc.default-consumes-media-type=application/json

####################################################
# JWT
####################################################

jwt.secret=BibliotecaITVO2026SistemaIntegralSeguridadJWTClaveSuperSecreta123456789
jwt.expiration=86400000